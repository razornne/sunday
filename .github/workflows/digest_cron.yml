name: Sunday AI Digest

on:
  workflow_dispatch:      # Кнопка ручного запуска
  schedule:
    - cron: '0 6 * * *'   # Запуск каждый день в 06:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Summarizer
      env:
        # Сюда мы передаем ключи из сейфа в скрипт
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        
        # ВАЖНО: Вот эти строки передают новые ключи
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        
        # Настройки почты (можно жестко прописать, это не секрет)
        SMTP_SERVER: "smtp.gmail.com"
        SMTP_PORT: 587
      run: python summarize.py